<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Atlas — Design System</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" />

<link rel="stylesheet" href="styles.css" />

<style>
  html, body { margin: 0; padding: 0; background: #ede4d0; }
  body { font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tree.js"></script>

<!-- Tweaks panel is reused from the main app -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- We need widgets + chrome (for Sidebar etc.) + home (for BookCard + BOOK_TINT) -->
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="design-system.jsx"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
  function mount() {
    if (!window.DesignSystem || !window.AtlasTweaksPanel) {
      requestAnimationFrame(mount);
      return;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<window.DesignSystem />);
  }
  mount();
</script>
</body>
</html>
